<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FBFAF5">
<title>Knack — ネイティブフレーズ帳</title>
<style>
:root{
  --paper:#FBFAF5; --card:#FFFFFF; --ink:#1B1C20; --sub:#75767D; --faint:#A9AAB1;
  --line:#E9E7DE; --hl:#FFE066; --hl-soft:#FFF3BF;
  --ok:#2E9E6B; --ok-soft:#E4F4EC; --ng:#D9534F; --ng-soft:#FBEAEA;
  --amber:#E8A13D;
  --r:18px;
  --safe-b: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:var(--paper); color:var(--ink);
  -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
}
.en{font-family:ui-rounded,-apple-system,"Hiragino Maru Gothic ProN","Noto Sans JP",sans-serif}
#app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
main{flex:1;padding:20px 20px calc(90px + var(--safe-b))}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;-webkit-user-select:none;user-select:none}

/* ---- header ---- */
.apphead{padding:26px 0 4px}
.apphead .logo{font-family:ui-rounded,-apple-system,sans-serif;font-weight:800;font-size:26px;letter-spacing:-.02em}
.apphead .logo .dot{color:var(--amber)}
.apphead .tag{font-size:12px;color:var(--sub);margin-top:2px}

/* ---- highlighter ---- */
.hl{background:linear-gradient(transparent 55%, var(--hl) 55%, var(--hl) 92%, transparent 92%);border-radius:2px}

/* ---- tab bar ---- */
nav{position:fixed;left:0;right:0;bottom:0;background:rgba(251,250,245,.92);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-top:1px solid var(--line);z-index:50}
nav .inner{max-width:560px;margin:0 auto;display:flex;padding:6px 8px calc(6px + var(--safe-b))}
nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 0;color:var(--faint);font-size:10.5px;font-weight:600;border-radius:12px}
nav button.on{color:var(--ink)}
nav button svg{width:23px;height:23px}
nav button.on .navdot{width:4px;height:4px;border-radius:2px;background:var(--hl);box-shadow:0 0 0 2px var(--hl-soft)}
.navdot{width:4px;height:4px;border-radius:2px;background:transparent}

/* ---- cards ---- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:0 1px 2px rgba(30,30,25,.03)}
.sect{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.06em;margin:26px 0 10px}
.row{display:flex;align-items:center;justify-content:space-between}

/* ---- home ---- */
.due-card{display:flex;align-items:center;gap:16px}
.due-num{font-family:ui-rounded,-apple-system,sans-serif;font-size:44px;font-weight:800;line-height:1}
.due-label{font-size:12px;color:var(--sub);margin-top:4px}
.btn{display:block;width:100%;text-align:center;background:var(--ink);color:#fff;font-weight:700;font-size:15px;padding:15px;border-radius:14px;transition:transform .08s}
.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.btn[disabled]{opacity:.35;pointer-events:none}
.statgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.statgrid .card{padding:13px 8px;text-align:center}
.statgrid .n{font-family:ui-rounded,-apple-system,sans-serif;font-size:22px;font-weight:800}
.statgrid .l{font-size:10.5px;color:var(--sub);margin-top:2px}
.catrow{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
.catrow:last-child{border-bottom:none}
.catrow .ic{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--hl-soft)}
.catrow .t{flex:1}
.catrow .t .n{font-weight:700;font-size:14.5px}
.catrow .t .s{font-size:11.5px;color:var(--sub);margin-top:1px}
.bar{height:5px;border-radius:3px;background:var(--line);overflow:hidden;margin-top:7px}
.bar i{display:block;height:100%;background:var(--ink);border-radius:3px;transition:width .4s}
.bar i.hl-bar{background:var(--hl)}

/* ---- study setup ---- */
.pick{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:9px 15px;border-radius:99px;border:1.5px solid var(--line);background:var(--card);font-size:13.5px;font-weight:600;color:var(--sub)}
.chip.on{border-color:var(--ink);color:var(--ink);background:var(--hl-soft)}
.modebtn{display:flex;align-items:center;gap:14px;width:100%;text-align:left;margin-bottom:10px}
.modebtn .ic{width:44px;height:44px;border-radius:14px;background:var(--hl-soft);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.modebtn .n{font-weight:700;font-size:15px}
.modebtn .s{font-size:12px;color:var(--sub);margin-top:2px}

/* ---- flashcard ---- */
.study-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.study-top .x{font-size:22px;color:var(--sub);padding:4px 8px}
.study-top .prog{flex:1}
.study-top .cnt{font-size:12px;color:var(--sub);font-variant-numeric:tabular-nums}
.fcard{min-height:380px;display:flex;flex-direction:column;justify-content:center;text-align:center;padding:30px 22px;position:relative}
.fcard .cat-eyebrow{position:absolute;top:16px;left:0;right:0;font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--faint)}
.fcard .phrase{font-size:30px;font-weight:800;line-height:1.3;letter-spacing:-.01em}
.fcard .meaning{font-size:20px;font-weight:700;margin-top:4px}
.fcard .nuance{font-size:13.5px;color:var(--sub);line-height:1.7;margin-top:14px}
.fcard .exbox{margin-top:22px;padding-top:18px;border-top:1px dashed var(--line);text-align:left}
.fcard .ex-en{font-size:15.5px;line-height:1.55;font-weight:600}
.fcard .ex-ja{font-size:12.5px;color:var(--sub);margin-top:6px;line-height:1.6}
.fcard .fliphint{position:absolute;bottom:14px;left:0;right:0;font-size:11px;color:var(--faint)}
.iconbtns{position:absolute;top:10px;right:12px;display:flex;gap:4px}
.iconbtns button{padding:7px;color:var(--faint)}
.iconbtns button.on{color:var(--amber)}
.iconbtns svg{width:21px;height:21px}
.speak{margin-top:14px;color:var(--sub)}
.speak svg{width:26px;height:26px}
.grades{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}
.grades button{padding:14px 2px;border-radius:14px;font-weight:700;font-size:13px;border:1.5px solid var(--line);background:var(--card);display:flex;flex-direction:column;align-items:center;gap:3px}
.grades .iv{font-size:9.5px;font-weight:600;color:var(--faint)}
.grades .g0{color:var(--ng)}
.grades .g1{color:var(--amber)}
.grades .g2{color:var(--ink)}
.grades .g3{color:var(--ok)}
.grades button:active{transform:scale(.96)}
.showans{margin-top:16px}

/* ---- quiz ---- */
.qcard{padding:26px 22px;text-align:center}
.qcard .qtype{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--faint);margin-bottom:14px}
.qcard .qtext{font-size:21px;font-weight:700;line-height:1.5}
.qcard .qsub{font-size:13px;color:var(--sub);margin-top:10px;line-height:1.6}
.choices{margin-top:18px;display:flex;flex-direction:column;gap:9px}
.choices button{padding:15px;border-radius:14px;border:1.5px solid var(--line);background:var(--card);font-weight:700;font-size:15px;text-align:center;transition:transform .08s}
.choices button:active{transform:scale(.98)}
.choices button.correct{border-color:var(--ok);background:var(--ok-soft);color:var(--ok)}
.choices button.wrong{border-color:var(--ng);background:var(--ng-soft);color:var(--ng);animation:shake .3s}
.choices button.dim{opacity:.45}
.dontknow{margin-top:12px;color:var(--sub);font-size:13.5px;font-weight:600;padding:8px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.qresult{margin-top:16px;text-align:left;padding:16px;border-radius:14px;background:var(--hl-soft);font-size:13.5px;line-height:1.7;animation:fadein .25s}
.qresult .rp{font-weight:800;font-size:16px}
.dlg-a{display:flex;gap:10px;align-items:flex-start;text-align:left;margin-top:4px}
.dlg-label{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.dlg-bubble{background:var(--paper);border:1px solid var(--line);border-radius:4px 16px 16px 16px;padding:12px 14px;font-size:16.5px;font-weight:700;line-height:1.5}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---- done screen ---- */
.done{text-align:center;padding:60px 20px}
.done .big{font-size:54px}
.done h2{font-size:20px;margin-top:14px}
.done p{font-size:13.5px;color:var(--sub);margin-top:8px;line-height:1.7}

/* ---- list ---- */
.search{width:100%;padding:12px 16px;border-radius:14px;border:1px solid var(--line);background:var(--card);font:inherit;font-size:14px;outline:none}
.search:focus{border-color:var(--ink)}
.filters{display:flex;gap:7px;overflow-x:auto;padding:12px 0 4px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filters .chip{flex-shrink:0;padding:7px 13px;font-size:12.5px}
.item{display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid var(--line)}
.item .st{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.item .t{flex:1;min-width:0}
.item .t .e{font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item .t .j{font-size:12px;color:var(--sub);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item .marks{display:flex;gap:3px;color:var(--faint);flex-shrink:0}
.item .marks svg{width:15px;height:15px}
.item.skipped .t{opacity:.4}
.st.s-new{background:var(--line)}
.st.s-learn{background:var(--amber)}
.st.s-done{background:var(--ok)}
.listcount{font-size:12px;color:var(--sub);padding:10px 2px 2px}

/* ---- detail sheet ---- */
.sheetwrap{position:fixed;inset:0;z-index:100;display:none}
.sheetwrap.open{display:block}
.sheetwrap .bg{position:absolute;inset:0;background:rgba(25,25,20,.35);animation:fadein .2s}
.sheet{position:absolute;left:0;right:0;bottom:0;max-width:560px;margin:0 auto;background:var(--paper);border-radius:24px 24px 0 0;padding:10px 22px calc(26px + var(--safe-b));max-height:86vh;overflow-y:auto;animation:slideup .28s cubic-bezier(.3,1,.4,1)}
@keyframes slideup{from{transform:translateY(40%)}to{transform:none}}
.sheet .grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:6px auto 18px}
.sheet .phrase{font-size:25px;font-weight:800;line-height:1.35}
.sheet .meaning{font-size:15.5px;font-weight:700;margin-top:8px}
.sheet .nuance{font-size:13px;color:var(--sub);line-height:1.75;margin-top:10px}
.sheet .exbox{margin-top:16px;padding:14px 16px;border-radius:14px;background:var(--card);border:1px solid var(--line)}
.sheet .ex-en{font-size:14.5px;font-weight:600;line-height:1.6}
.sheet .ex-ja{font-size:12px;color:var(--sub);margin-top:5px;line-height:1.6}
.sheet .meta{display:flex;gap:6px;margin-top:16px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;background:var(--card);border:1px solid var(--line);color:var(--sub)}
.badge.hlb{background:var(--hl-soft);border-color:var(--hl);color:var(--ink)}
.sheet .acts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
.sheet .acts button{padding:13px;border-radius:14px;border:1.5px solid var(--line);background:var(--card);font-weight:700;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:7px}
.sheet .acts button.on{border-color:var(--ink);background:var(--hl-soft)}
.sheet .acts svg{width:17px;height:17px}
.resetlink{display:block;text-align:center;margin-top:16px;font-size:12.5px;color:var(--faint);text-decoration:underline;width:100%}
.toast{position:fixed;bottom:calc(100px + var(--safe-b));left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:99px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app"><main id="main"></main></div>
<nav><div class="inner" id="nav"></div></nav>
<div class="sheetwrap" id="sheetwrap"><div class="bg" onclick="closeSheet()"></div><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<script>
// ===== DATA =====
// c: 1=会話構文パターン 2=句動詞 3=定型フレーズ
// f: [穴埋め文, 正解, "誤答|誤答|誤答"]
const DATA=[
// ---------- ① 会話構文パターン (50) ----------
{i:"g01",c:1,en:"might as well 〜",ja:"（どうせなら）〜しちゃおう",nu:"他に良い選択肢がない時の「じゃあ〜するか」。積極的なやる気ではなく消去法のニュアンス。",lv:"B1",ex:["The bus isn't coming. We might as well walk.","バス来ないね。もう歩いちゃおうか。"],f:["We ___ as well walk home.","might","may|would|should"]},
{i:"g02",c:1,en:"It's not like 〜",ja:"別に〜ってわけじゃないし",nu:"言い訳や反論でよく使う。「〜なわけでもあるまいし」と軽く突き放す感じ。",lv:"B1",ex:["Relax. It's not like we're in a hurry.","落ち着いて。別に急いでるわけじゃないんだから。"],f:["It's not ___ I hate him. I'm just busy.","like","that|as|so"]},
{i:"g03",c:1,en:"I was gonna say 〜",ja:"今言おうと思ってたんだけど",nu:"相手に先を越された時や、話を切り出す時のクッション。gonna = going to。",lv:"B1",ex:["I was gonna say the same thing!","今まさに同じこと言おうとしてた！"],f:["I was ___ to say we should leave early.","going","willing|about|planning"]},
{i:"g04",c:1,en:"You know what?",ja:"あのさ、／ていうかさ、",nu:"話を切り出したり、考えが変わった時の前置き。「ねえ聞いて」の合図。",lv:"A2",ex:["You know what? Let's just order pizza.","ていうかさ、もうピザ頼もうよ。"],f:["You know ___? I changed my mind.","what","that|it|this"]},
{i:"g05",c:1,en:"What if 〜?",ja:"もし〜だったらどうする？",nu:"心配・提案の両方に使える。「〜したらどう？」という軽い提案にも。",lv:"A2",ex:["What if it rains tomorrow?","明日雨だったらどうする？"],f:["___ if we miss the train?","What","How|Why|Which"]},
{i:"g06",c:1,en:"I can't help 〜ing",ja:"〜せずにはいられない",nu:"感情や癖が抑えられない時。help = 避ける、の意味。",lv:"B1",ex:["I can't help laughing when I see that photo.","あの写真見ると笑わずにいられない。"],f:["I can't ___ checking my phone.","help","stop|avoid|keep"]},
{i:"g07",c:1,en:"be supposed to 〜",ja:"〜することになっている／〜のはず",nu:"予定・ルール・世間の期待。過去形 was supposed to は「〜のはずだったのに」。",lv:"B1",ex:["You're supposed to take off your shoes here.","ここは靴を脱ぐことになってるよ。"],f:["The meeting was ___ to start at ten.","supposed","expected|planned|meant"]},
{i:"g08",c:1,en:"be about to 〜",ja:"まさに〜するところ",nu:"直前の動作。「ちょうど今から〜する」。just を足すとさらに直前感が出る。",lv:"B1",ex:["I was just about to call you.","ちょうど今、電話しようとしてたところ。"],f:["Hurry up! The movie is ___ to start.","about","going|near|ready"]},
{i:"g09",c:1,en:"end up 〜ing",ja:"結局〜することになる",nu:"予定と違う結末や成り行き。「気づいたら〜してた」にも近い。",lv:"B1",ex:["We ended up staying home all day.","結局一日中家にいることになった。"],f:["We ended ___ taking a taxi.","up","in|out|off"]},
{i:"g10",c:1,en:"It turns out (that) 〜",ja:"（結局）〜だと分かった",nu:"予想と違う事実が判明した時。「フタを開けてみたら」の感覚。",lv:"B2",ex:["It turns out he was right all along.","結局、彼がずっと正しかったんだ。"],f:["It ___ out the store was closed.","turns","comes|finds|works"]},
{i:"g11",c:1,en:"I bet 〜",ja:"きっと〜だと思う",nu:"賭けてもいいくらい確信がある時。I bet you're tired.（絶対疲れてるでしょ）",lv:"B1",ex:["I bet she already knows.","彼女、絶対もう知ってるよ。"],f:["I ___ it's going to rain.","bet","guess|hope|say"]},
{i:"g12",c:1,en:"I wish I could 〜",ja:"〜できたらいいのに",nu:"実際にはできないことへの願望。誘いを断る時にも使える丁寧な言い方。",lv:"B1",ex:["I wish I could stay longer.","もっと長くいられたらいいんだけど。"],f:["I wish I ___ speak French.","could","can|would|will"]},
{i:"g13",c:1,en:"If I were you, 〜",ja:"私だったら〜するな",nu:"アドバイスの定番。I'd（I would）とセットで使う。",lv:"B1",ex:["If I were you, I'd take the job.","私だったらその仕事引き受けるな。"],f:["If I ___ you, I would apologize.","were","am|was|be"]},
{i:"g14",c:1,en:"would rather 〜",ja:"どちらかというと〜したい",nu:"2つの選択肢で好みを言う。would rather A than B の形も。短縮は I'd rather。",lv:"B1",ex:["I'd rather stay home tonight.","今夜はどっちかというと家にいたいな。"],f:["I'd ___ walk than wait for the bus.","rather","better|prefer|like"]},
{i:"g15",c:1,en:"had better 〜",ja:"〜したほうがいい（さもないと）",nu:"警告寄りの助言。should より強く「やらないとまずい」感がある。短縮は 'd better。",lv:"B1",ex:["You'd better leave now or you'll miss it.","今出ないと間に合わないよ。"],f:["You'd ___ take an umbrella.","better","rather|best|well"]},
{i:"g16",c:1,en:"It depends (on 〜)",ja:"〜による／場合による",nu:"即答できない時の万能フレーズ。単体で That depends. とも。",lv:"A2",ex:["It depends on the weather.","天気によるかな。"],f:["It ___ on how much it costs.","depends","decides|matters|based"]},
{i:"g17",c:1,en:"as far as I know",ja:"私の知る限りでは",nu:"断言を避けるクッション。文頭・文末どちらでも使える。",lv:"B1",ex:["As far as I know, the store opens at ten.","私の知る限りだと、店は10時オープンだよ。"],f:["As ___ as I know, he's still in Tokyo.","far","long|much|soon"]},
{i:"g18",c:1,en:"Now that 〜",ja:"〜した今となっては／〜だから",nu:"状況が変わったことを前提に話を進める。「もう〜なんだから」。",lv:"B2",ex:["Now that you're here, let's get started.","君も来たことだし、始めようか。"],f:["___ that everyone is here, let's begin.","Now","So|Since|Then"]},
{i:"g19",c:1,en:"The thing is, 〜",ja:"実はね、／問題はね、",nu:"本題や言いにくい事情を切り出す前置き。ネイティブの会話で超頻出。",lv:"B1",ex:["I'd love to come. The thing is, I have no money.","行きたいのはやまやまなんだけど、実はお金がなくて。"],f:["The ___ is, I forgot to book a table.","thing","point|fact|matter"]},
{i:"g20",c:1,en:"What I mean is 〜",ja:"つまり言いたいのは〜",nu:"言い直し・補足の定番。誤解されそうな時に。",lv:"B1",ex:["What I mean is, we need more time.","つまり、もっと時間が必要ってこと。"],f:["What I ___ is, it's too expensive.","mean","say|think|tell"]},
{i:"g21",c:1,en:"It's just that 〜",ja:"ただ〜なだけなんだ",nu:"弁解・本音をやわらかく言う。「嫌いとかじゃなくて、ただ…」の流れで。",lv:"B1",ex:["I like it. It's just that it's a bit pricey.","気に入ってるよ。ただちょっと高いだけで。"],f:["It's just ___ I'm really tired today.","that","what|why|because"]},
{i:"g22",c:1,en:"kind of / sort of",ja:"なんか／ちょっと／まあまあ",nu:"断言をぼかす万能ワード。発音は kinda / sorta になりがち。",lv:"A2",ex:["I'm kind of tired today.","今日なんかちょっと疲れてる。"],f:["It's ___ of cold in here.","kind","type|little|much"]},

<script>
// ===== STATE =====
const LS="knack_v1";
let S=load();
function load(){try{return JSON.parse(localStorage.getItem(LS))||{rec:{}}}catch(e){return{rec:{}}}}
function save(){localStorage.setItem(LS,JSON.stringify(S))}
function rec(id){return S.rec[id]||(S.rec[id]={st:0,due:null,lg:null,bm:false,sk:false,n:0})}
function getRec(id){return S.rec[id]}
const INT=[1,3,7,14,30,60];
function today(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function status(it){const r=getRec(it.i);if(!r||r.n===0)return"new";if(r.st>=6)return"done";return"learn"}
function isDue(it){const r=getRec(it.i);return r&&r.n>0&&!r.sk&&r.due&&r.due<=today()}
function isNew(it){const r=getRec(it.i);return(!r||r.n===0)&&!(r&&r.sk)}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;")}
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};

// ===== AUDIO ===== (将来: audio/{id}.mp3 の事前生成ファイルに差し替え可)
let VOICE=null;
function pickVoice(){const vs=speechSynthesis.getVoices();VOICE=vs.find(v=>v.lang==="en-US"&&/Samantha|Ava|Google US/i.test(v.name))||vs.find(v=>v.lang==="en-US")||vs.find(v=>v.lang.startsWith("en"))||null}
if("speechSynthesis"in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice}
function speak(text){if(!("speechSynthesis"in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text.replace(/〜/g,"").replace(/\u0022/g,""));u.lang="en-US";if(VOICE)u.voice=VOICE;u.rate=0.92;speechSynthesis.speak(u)}
// 事前生成音声（audio/{id}.mp3 = フレーズ, audio/{id}_ex.mp3 = 例文）があれば優先、なければ端末TTS
let AUDIO_ON=null;
function playFile(name,fallback){
  if(AUDIO_ON===false){speak(fallback);return}
  const a=new Audio("audio/"+name+".mp3");
  a.onerror=()=>{AUDIO_ON=false;speak(fallback)};
  a.play().then(()=>{AUDIO_ON=true}).catch(()=>{AUDIO_ON=false;speak(fallback)});
}

// ===== ICONS =====
const IC={
home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>',
study:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="14" height="16" rx="2"/><path d="M7 3h12a2 2 0 0 1 2 2v14"/><path d="M7 10h6M7 14h4"/></svg>',
list:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="3.5" cy="6" r="1"/><circle cx="3.5" cy="12" r="1"/><circle cx="3.5" cy="18" r="1"/></svg>',
bm:f=>'<svg viewBox="0 0 24 24" fill="'+(f?"currentColor":"none")+'" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M6 3h12v18l-6-4.5L6 21z"/></svg>',
skip:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M6 6l12 12"/></svg>',
spk:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M18.5 5.5a9 9 0 0 1 0 13"/></svg>'
};

// ===== NAV =====
let TAB="home";
const TABS=[["home","ホーム",IC.home],["study","学習",IC.study],["list","一覧",IC.list]];
function renderNav(){document.getElementById("nav").innerHTML=TABS.map(t=>
`<button class="${TAB===t[0]?"on":""}" onclick="go('${t[0]}')">${t[2]}<span>${t[1]}</span><span class="navdot"></span></button>`).join("")}
function go(t){TAB=t;session=null;pendingMode=null;render()}
function toast(m){const el=document.getElementById("toast");el.textContent=m;el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),1800)}

// ===== HOME =====
function counts(){let nw=0,ln=0,dn=0,sk=0;DATA.forEach(it=>{const r=getRec(it.i);if(r&&r.sk){sk++;return}const s=status(it);if(s==="new")nw++;else if(s==="learn")ln++;else dn++});return{nw,ln,dn,sk}}
function homeView(){
  const due=DATA.filter(isDue).length,c=counts();
  const LVINFO={A2:"やさしい",B1:"基礎",B2:"中級",C1:"上級"};
  const lvRows=["A2","B1","B2","C1"].map(lv=>{
    const items=DATA.filter(it=>it.lv===lv&&!(getRec(it.i)&&getRec(it.i).sk));
    const done=items.filter(it=>status(it)!=="new").length;
    const mastered=items.filter(it=>status(it)==="done").length;
    return `<div class="catrow"><div class="ic" style="font-size:13px;font-weight:800">${lv}</div><div class="t"><div class="row"><div class="n">${LVINFO[lv]}</div><div style="font-size:11.5px;color:var(--sub)">${done} / ${items.length}${mastered?`　<span style="color:var(--ok)">習得 ${mastered}</span>`:""}</div></div><div class="bar"><i style="width:${items.length?Math.round(done/items.length*100):0}%"></i></div></div></div>`;
  }).join("");
  const cats=[1,2,3].map(ci=>{
    const items=DATA.filter(it=>it.c===ci&&!(getRec(it.i)&&getRec(it.i).sk));
    const done=items.filter(it=>status(it)!=="new").length;
    return `<div class="catrow"><div class="ic">${CATS[ci].ic}</div><div class="t"><div class="n">${CATS[ci].n}</div><div class="s">${done} / ${items.length}　${CATS[ci].d}</div><div class="bar"><i style="width:${items.length?Math.round(done/items.length*100):0}%"></i></div></div></div>`;
  }).join("");
  return `
  <div class="apphead"><div class="logo">Knack<span class="dot">.</span></div><div class="tag">ネイティブの<span class="hl">日常フレーズ</span>を、忘れる前に。</div></div>
  <div class="sect">今日の学習</div>
  <div class="card due-card">
    <div><div class="due-num">${due}</div><div class="due-label">復習が待っています</div></div>
    <div style="flex:1"></div>
    <div style="width:150px"><button class="btn" ${due+c.nw===0?"disabled":""} onclick="quickStart()">はじめる</button></div>
  </div>
  <div class="sect">ステータス</div>
  <div class="statgrid">
    <div class="card"><div class="n">${c.nw}</div><div class="l">未学習</div></div>
    <div class="card"><div class="n" style="color:var(--amber)">${c.ln}</div><div class="l">学習中</div></div>
    <div class="card"><div class="n" style="color:var(--ok)">${c.dn}</div><div class="l">習得済み</div></div>
  </div>
  <div class="sect">カテゴリ</div>
  <div class="card" style="padding:6px 18px">${cats}</div>
  <div class="sect">レベル</div>
  <div class="card" style="padding:6px 18px">${lvRows}</div>
  <p style="font-size:11px;color:var(--faint);text-align:center;margin-top:22px">全${DATA.length}項目収録 · オフライン対応</p>`;
}
function quickStart(){TAB="study";setupCats=new Set([1,2,3]);startSession("flash","all")}

// ===== STUDY SETUP =====
let setupCats=new Set([1,2,3]);
let pendingMode=null;
const LVS=[["all","ランダム","全レベルからシャッフル出題"],["A2","A2 やさしい","基礎のきほん"],["B1","B1 基礎","日常会話の土台"],["B2","B2 中級","こなれた表現"],["C1","C1 上級","ネイティブ感が出る"]];
function studyView(){
  if(pendingMode)return levelView();
  const pool=poolItems("all");
  const due=pool.filter(isDue).length,nw=pool.filter(isNew).length;
  return `
  <div class="apphead"><div class="logo">学習</div><div class="tag">カテゴリを選んでモードをタップ</div></div>
  <div class="sect">カテゴリ</div>
  <div class="pick">${[1,2,3].map(ci=>`<button class="chip ${setupCats.has(ci)?"on":""}" onclick="togCat(${ci})">${CATS[ci].ic} ${CATS[ci].n}</button>`).join("")}</div>
  <div class="sect">モード　<span style="font-weight:400;color:var(--faint)">復習 ${due} ・ 新規 ${nw}</span></div>
  <button class="card modebtn" onclick="chooseMode('flash')"><div class="ic">🃏</div><div><div class="n">フラッシュカード</div><div class="s">忘却曲線が進むのはこのモードだけ</div></div></button>
  <button class="card modebtn" onclick="chooseMode('quiz')"><div class="ic">✅</div><div><div class="n">4択クイズ</div><div class="s">穴埋め＆意味あて。間違えると復習に戻ります</div></div></button>
  <div class="sect">対象外</div>
  <p style="font-size:12.5px;color:var(--sub);line-height:1.7;padding:0 2px">「学習しない」に設定した項目と習得済みの項目（復習日前）は出題されません。一覧からいつでも変更できます。</p>`;
}
function chooseMode(m){pendingMode=m;render()}
function levelView(){
  const rows=LVS.map(lv=>{
    const pool=poolItems(lv[0]);
    const due=pool.filter(isDue).length,nw=pool.filter(isNew).length;
    const dis=due+nw===0;
    return `<button class="card modebtn" ${dis?'style="opacity:.4" disabled':""} onclick="startSession('${pendingMode}','${lv[0]}')"><div class="ic">${lv[0]==="all"?"🎲":lv[0]}</div><div style="flex:1"><div class="n">${lv[1]}</div><div class="s">${lv[2]}</div></div><div style="font-size:11px;color:var(--faint);text-align:right;flex-shrink:0">復習 ${due}<br>新規 ${nw}</div></button>`;
  }).join("");
  const scnRows=Object.keys(SCN).map(k=>{
    const pool=poolItems("all",k);
    const due=pool.filter(isDue).length,nw=pool.filter(isNew).length;
    if(due+nw===0)return"";
    return `<button class="chip" style="display:inline-flex;gap:5px;align-items:center" onclick="startSession('${pendingMode}','all','${k}')">${SCN[k][0]} ${SCN[k][1]}<span style="color:var(--faint);font-size:11px">${due+nw}</span></button>`;
  }).join("");
  return `
  <div class="study-top" style="margin-top:26px"><button class="x" onclick="pendingMode=null;render()">←</button><div style="flex:1"><div style="font-weight:800;font-size:18px">${pendingMode==="flash"?"🃏 フラッシュカード":"✅ 4択クイズ"}</div><div style="font-size:12px;color:var(--sub)">レベルかシーンを選んでスタート</div></div></div>
  ${rows}
  <div class="sect">シーンで選ぶ</div>
  <div class="pick">${scnRows}</div>`;
}
function togCat(ci){if(setupCats.has(ci)){if(setupCats.size>1)setupCats.delete(ci)}else setupCats.add(ci);render()}
function poolItems(lv,scn){return DATA.filter(it=>setupCats.has(it.c)&&(lv==="all"||it.lv===lv)&&(!scn||TAGMAP[it.i]===scn)&&!(getRec(it.i)&&getRec(it.i).sk))}

// ===== SESSION =====
let session=null;
function startSession(mode,lv,scn){
  lv=lv||"all";
  const pool=poolItems(lv,scn||null);
  let q=shuffle(pool.filter(isDue));
  const MAX=15;
  if(q.length<MAX)q=q.concat(shuffle(pool.filter(isNew)).slice(0,MAX-q.length));
  q=q.slice(0,MAX);
  if(!q.length){toast("出題できる項目がありません");return}
  session={mode,lv,scn:scn||"",q,idx:0,flip:false,ans:null,right:0,wrong:0,requeued:new Set()};
  render();
}
function endSession(){session=null;pendingMode=null;render()}
function cur(){return session.q[session.idx]}
function nextCard(){
  session.idx++;session.flip=false;session.ans=null;
  if(session.idx>=session.q.length){renderDone()}else render();
}
function renderDone(){
  document.getElementById("main").innerHTML=`
  <div class="done"><div class="big">🎉</div><h2>セッション完了！</h2>
  <p>${session.q.length}枚 学習しました${session.mode==="quiz"?`<br>正解 ${session.right} ・ 不正解 ${session.wrong}`:""}<br>おつかれさまでした。</p>
  <div style="margin-top:28px"><button class="btn" onclick="startSession('${session.mode}','${session.lv}',session.scn||null)">もう一度</button>
  <button class="btn ghost" style="margin-top:10px" onclick="endSession()">終了する</button></div></div>`;
  window.scrollTo(0,0);
}
// flashcard grading (SRSはここだけ進行) 0=できない 1=難しい 2=普通 3=簡単
function grade(g){
  const it=cur(),r=rec(it.i);r.n++;r.lg=g;
  if(g===0){r.st=0;r.due=today();if(!session.requeued.has(it.i)){session.requeued.add(it.i);session.q.push(it)}}
  else if(g===1){r.due=addDays(1)}
  else if(g===2){r.st=Math.min(r.st+1,6);r.due=addDays(INT[Math.min(r.st-1,5)])}
  else{r.st=Math.min(r.st+2,6);r.due=addDays(INT[Math.min(r.st-1,5)])}
  save();nextCard();
}
// 学習しない（セッション中）：対象から外して次のカードへ
function skipCur(){
  const it=cur(),r=rec(it.i);r.sk=true;save();
  toast("学習対象から外しました");
  session.q=session.q.filter((x,j)=>j<=session.idx||x.i!==it.i);
  nextCard();
}
// 各評価での次回間隔表示用
function nextIv(g){
  const r=getRec(cur().i)||{st:0};
  if(g===0)return"今日";
  if(g===1)return"1日";
  const st=Math.min(r.st+(g===2?1:2),6);
  const d=INT[Math.min(st-1,5)];
  return d+"日";
}
// quiz answer (SRSは進めず、間違いはlg=0＋当日復習に戻す)
function answer(idx){
  if(session.ans!==null)return;
  session.ans=idx;
  const it=cur(),correct=idx===session._ci;
  const r=rec(it.i);
  if(correct){session.right++}
  else{session.wrong++;r.lg=0;if(r.n>0)r.due=today()}
  save();render(true);
}
function dontKnow(){if(session.ans!==null)return;session.ans=-1;session.wrong++;const r=rec(cur().i);r.lg=0;if(r.n>0)r.due=today();save();render(true)}

function sessionView(keep){
  const it=cur(),r=getRec(it.i);
  const prog=`<div class="study-top"><button class="x" onclick="endSession()">✕</button><div class="prog"><div class="bar"><i class="hl-bar" style="width:${Math.round(session.idx/session.q.length*100)}%"></i></div></div><div class="cnt">${session.idx+1} / ${session.q.length}</div></div>`;
  const marks=session.mode==="flash"
    ?`<div class="iconbtns"><button class="${r&&r.bm?"on":""}" onclick="event.stopPropagation();togBm('${it.i}')">${IC.bm(r&&r.bm)}</button><button onclick="event.stopPropagation();skipCur()">${IC.skip}</button></div>`
    :`<div class="iconbtns"><button class="${r&&r.bm?"on":""}" onclick="event.stopPropagation();togBm('${it.i}')">${IC.bm(r&&r.bm)}</button></div>`;
  if(session.mode==="flash"){
    const front=`<div class="cat-eyebrow">${CATS[it.c].n} · ${it.lv}</div>${marks}
      <div class="phrase en">${esc(it.en)}</div>
      <button class="speak" onclick="event.stopPropagation();playFile('${it.i}','${it.en.replace(/'/g,"\\'")}')">${IC.spk}</button>
      <div class="exbox"><div class="ex-en en">${esc(it.ex[0])}</div></div>
      <div class="fliphint">タップして意味を表示</div>`;
    const back=`<div class="cat-eyebrow">${CATS[it.c].n} · ${it.lv}</div>${marks}
      <div class="phrase en" style="font-size:22px">${esc(it.en)}</div>
      <div class="meaning">${esc(it.ja)}</div>
      <div class="nuance">${esc(it.nu)}</div>
      <div class="exbox"><div class="ex-en en">${esc(it.ex[0])}</div><div class="ex-ja">${esc(it.ex[1])}</div>
      <button class="speak" style="margin-top:8px" onclick="event.stopPropagation();playFile('${it.i}_ex','${it.ex[0].replace(/'/g,"\\'")}')">${IC.spk}</button></div>`;
    document.getElementById("main").innerHTML=prog+
      `<div class="card fcard" onclick="flip()">${session.flip?back:front}</div>`+
      (session.flip
        ?`<div class="grades"><button class="g0" onclick="grade(0)">できない<span class="iv">${nextIv(0)}</span></button><button class="g1" onclick="grade(1)">難しい<span class="iv">${nextIv(1)}</span></button><button class="g2" onclick="grade(2)">普通<span class="iv">${nextIv(2)}</span></button><button class="g3" onclick="grade(3)">簡単<span class="iv">${nextIv(3)}</span></button></div>`
        :`<button class="btn showans" onclick="flip()">答えを見る</button>`);
  }else{
    // quiz: fill-in if available, else meaning 4-choice
    if(!keep){
      if(DLG[it.i]&&Math.random()<0.55){
        session._type="dlg";
        const myTag=TAGMAP[it.i];
        const others=shuffle(DATA.filter(d=>d.c===3&&d.i!==it.i&&TAGMAP[d.i]&&TAGMAP[d.i]!==myTag)).slice(0,3).map(d=>d.en);
        const opts=shuffle([it.en,...others]);session._opts=opts;session._ci=opts.indexOf(it.en);
      }
      else if(it.f){session._type="fill";const opts=shuffle([it.f[1],...it.f[2].split("|")]);session._opts=opts;session._ci=opts.indexOf(it.f[1])}
      else{session._type="mean";const others=shuffle(DATA.filter(d=>d.i!==it.i&&d.c===it.c)).slice(0,3).map(d=>d.ja);const opts=shuffle([it.ja,...others]);session._opts=opts;session._ci=opts.indexOf(it.ja)}
    }
    const answered=session.ans!==null;
    const q=session._type==="dlg"
      ?`<div class="qtype">会話 ─ Bの自然な返しは？</div><div class="dlg-a"><div class="dlg-label">A</div><div class="dlg-bubble en">${esc(DLG[it.i][0])}</div></div><div class="qsub">${esc(DLG[it.i][1])}</div>`
      :session._type==="fill"
      ?`<div class="qtype">穴埋め ─ 空欄に入る語は？</div><div class="qtext en">${esc(it.f[0]).replace("___",'<span class="hl">＿＿＿</span>')}</div><div class="qsub">${answered?"":esc(it.ja)}</div>`
      :`<div class="qtype">意味あて ─ 正しい意味は？</div><div class="qtext en"><span class="hl">${esc(it.en)}</span></div>`;
    const choices=session._opts.map((o,i)=>{
      let cls="";
      if(answered){if(i===session._ci)cls="correct";else if(i===session.ans)cls="wrong";else cls="dim"}
      return `<button class="${cls} ${session._type!=='mean'?'en':''}" onclick="answer(${i})">${esc(o)}</button>`;
    }).join("");
    const resTxt=session._type==="dlg"?DLG[it.i][0]+" "+it.en:(it.f?it.f[0].replace("___",it.f[1]):it.ex[0]);
    const result=answered?`<div class="qresult"><div class="rp en">${esc(it.en)}</div><div style="margin-top:4px">${esc(it.ja)}</div><div style="color:var(--sub);margin-top:6px">${session._type==="dlg"?"A: "+esc(DLG[it.i][0])+"<br>B: "+esc(it.en):esc(it.f?it.f[0].replace("___",it.f[1]):it.ex[0])}</div><button class="speak" onclick="${session._type==="dlg"?`playFile('${it.i}_dlg','${resTxt.replace(/'/g,"\\'")}')`:`speak('${resTxt.replace(/'/g,"\\'")}')`}">${IC.spk}</button></div><button class="btn" style="margin-top:14px" onclick="nextCard()">次へ</button>`:`<button class="dontknow" onclick="dontKnow()">わからない</button>`;
    document.getElementById("main").innerHTML=prog+`<div class="card qcard">${q}<div class="choices">${choices}</div></div>${result}`;
    if(answered&&session._type==="fill")speak(it.f[0].replace("___",it.f[1]));
    if(answered&&session._type==="dlg")playFile(cur().i+"_dlg",DLG[it.i][0]+" ... "+it.en);
  }
  if(!keep)window.scrollTo(0,0);
}
function flip(){session.flip=!session.flip;if(session.flip)playFile(cur().i,cur().en);render(true)}

// ===== LIST =====
let q="",flt="all",scnFlt="all";
const FILTERS=[["all","すべて"],["c1","✏️ 構文"],["c2","🔗 句動詞"],["c3","💬 フレーズ"],["new","未学習"],["learn","学習中"],["done","習得済み"],["bm","ブックマーク"],["sk","学習しない"]];
function listView(){
  let items=DATA.filter(it=>{
    const r=getRec(it.i);
    if(flt.startsWith("c")&&it.c!==+flt[1])return false;
    if(flt==="new"&&status(it)!=="new")return false;
    if(flt==="learn"&&status(it)!=="learn")return false;
    if(flt==="done"&&status(it)!=="done")return false;
    if(flt==="bm"&&!(r&&r.bm))return false;
    if(flt==="sk"&&!(r&&r.sk))return false;
    if(flt!=="sk"&&r&&r.sk)return false;
    if(scnFlt!=="all"&&TAGMAP[it.i]!==scnFlt)return false;
    if(q&&!(it.en.toLowerCase().includes(q.toLowerCase())||it.ja.includes(q)))return false;
    return true;
  });
  const rows=items.map(it=>{
    const r=getRec(it.i),s=status(it);
    return `<div class="item ${r&&r.sk?"skipped":""}" onclick="openSheet('${it.i}')">
      <div class="st s-${s}"></div>
      <div class="t"><div class="e en">${esc(it.en)}</div><div class="j">${esc(it.ja)}</div></div>
      <div class="marks">${r&&r.bm?IC.bm(true):""}${r&&r.sk?IC.skip:""}</div></div>`;
  }).join("");
  return `
  <div class="apphead"><div class="logo">一覧</div></div>
  <input class="search" placeholder="英語・日本語で検索" value="${esc(q)}" oninput="q=this.value;renderList()">
  <div class="filters">${FILTERS.map(f=>`<button class="chip ${flt===f[0]?"on":""}" onclick="flt='${f[0]}';renderList()">${f[1]}</button>`).join("")}</div>
  <div class="filters" style="padding-top:2px"><button class="chip ${scnFlt==="all"?"on":""}" onclick="scnFlt='all';renderList()">シーン: すべて</button>${Object.keys(SCN).map(k=>`<button class="chip ${scnFlt===k?"on":""}" onclick="scnFlt='${k}';renderList()">${SCN[k][0]} ${SCN[k][1]}</button>`).join("")}</div>
  <div id="listbody"><div class="listcount">${items.length} 件</div>${rows||'<p style="text-align:center;color:var(--faint);padding:40px 0;font-size:13px">該当する項目がありません</p>'}</div>`;
}
function renderList(){
  const inp=document.querySelector(".search");
  const pos=inp?inp.selectionStart:0;
  render();
  const ni=document.querySelector(".search");
  if(ni&&document.activeElement!==ni&&q){ni.focus();ni.setSelectionRange(pos,pos)}
}

// ===== DETAIL SHEET =====
let sheetId=null;
function openSheet(id){sheetId=id;drawSheet();document.getElementById("sheetwrap").classList.add("open")}
function closeSheet(){document.getElementById("sheetwrap").classList.remove("open");sheetId=null}
function drawSheet(){
  const it=DATA.find(d=>d.i===sheetId),r=getRec(sheetId);
  const s=status(it),sn={new:"未学習",learn:"学習中",done:"習得済み"}[s];
  const dueTxt=r&&r.n>0&&r.due?(r.due<=today()?"復習: 今日":"次回: "+r.due.slice(5).replace("-","/")):null;
  document.getElementById("sheet").innerHTML=`
  <div class="grab"></div>
  <div class="phrase en"><span class="hl">${esc(it.en)}</span></div>
  <div class="meaning">${esc(it.ja)}</div>
  <div class="nuance">${esc(it.nu)}</div>
  <button class="speak" onclick="playFile('${it.i}','${it.en.replace(/'/g,"\\'")}')">${IC.spk}</button>
  <div class="exbox"><div class="ex-en en">${esc(it.ex[0])}</div><div class="ex-ja">${esc(it.ex[1])}</div>
  <button class="speak" style="margin-top:6px" onclick="playFile('${it.i}_ex','${it.ex[0].replace(/'/g,"\\'")}')">${IC.spk}</button></div>
  ${it.f?`<div class="exbox" style="margin-top:10px"><div style="font-size:11px;font-weight:700;color:var(--faint);letter-spacing:.06em;margin-bottom:6px">穴埋めクイズ収録</div><div class="ex-en en">${esc(it.f[0]).replace("___",'<span class="hl">'+esc(it.f[1])+'</span>')}</div></div>`:""}
  <div class="meta"><span class="badge">${CATS[it.c].ic} ${CATS[it.c].n}</span><span class="badge">${it.lv}</span>${TAGMAP[it.i]?`<span class="badge">${SCN[TAGMAP[it.i]][0]} ${SCN[TAGMAP[it.i]][1]}</span>`:""}<span class="badge ${s==="done"?"hlb":""}">${sn}</span>${dueTxt?`<span class="badge">${dueTxt}</span>`:""}</div>
  <div class="acts">
    <button class="${r&&r.bm?"on":""}" onclick="togBm('${it.i}');drawSheet()">${IC.bm(r&&r.bm)} ブックマーク</button>
    <button class="${r&&r.sk?"on":""}" onclick="togSk('${it.i}')">${IC.skip} 学習しない</button>
  </div>
  ${r&&r.n>0?`<button class="resetlink" onclick="resetItem('${it.i}')">この項目の学習履歴をリセット</button>`:""}`;
}
function togBm(id){const r=rec(id);r.bm=!r.bm;save();toast(r.bm?"ブックマークしました":"ブックマークを外しました");if(sheetId)drawSheet();else render(true)}
function togSk(id){const r=rec(id);r.sk=!r.sk;save();toast(r.sk?"学習対象から外しました":"学習対象に戻しました");drawSheet();}
function resetItem(id){const r=rec(id);r.st=0;r.due=null;r.lg=null;r.n=0;save();toast("リセットしました");drawSheet()}

// ===== RENDER =====
function render(keep){
  renderNav();
  if(session){sessionView(keep);return}
  const m=document.getElementById("main");
  if(TAB==="home")m.innerHTML=homeView();
  else if(TAB==="study")m.innerHTML=studyView();
  else m.innerHTML=listView();
  if(!keep)window.scrollTo(0,0);
}
render();
</script>
